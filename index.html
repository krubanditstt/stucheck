<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ระบบเช็คชื่อเข้าเรียน</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

<style>

body{
    background:#f4f7fb;
    font-family:system-ui,sans-serif;
}

.login-card,
.main-card{
    border:none;
    border-radius:24px;
    box-shadow:0 10px 30px rgba(0,0,0,.08);
}

.student-card{
    background:white;
    border-radius:18px;
    padding:16px;
    margin-bottom:12px;
    border:1px solid #e5e7eb;
}

.btn-main{
    border-radius:14px;
    padding:12px;
    font-weight:700;
}

.header-title{
    font-size:28px;
    font-weight:800;
}

</style>

</head>

<body>

<div class="container py-4">

    <!-- LOGIN -->

    <div id="loginPage">

        <div class="row justify-content-center">

            <div class="col-md-5">

                <div class="card login-card p-4">

                    <div class="text-center mb-4">

                        <div class="header-title">
                            ระบบเช็คชื่อ
                        </div>

                        <div class="text-muted">
                            Student Attendance System
                        </div>

                    </div>

                    <input
                        type="text"
                        id="username"
                        class="form-control mb-3"
                        placeholder="Username"
                    >

                    <input
                        type="password"
                        id="password"
                        class="form-control mb-3"
                        placeholder="Password"
                    >

                    <button
                        class="btn btn-primary btn-main w-100"
                        onclick="login()"
                    >
                        เข้าสู่ระบบ
                    </button>

                </div>

            </div>

        </div>

    </div>

    <!-- APP -->

    <div id="appPage" style="display:none;">

        <div class="card main-card p-4 mb-3">

            <div class="d-flex justify-content-between align-items-center">

                <div>

                    <div class="header-title">
                        Dashboard
                    </div>

                    <div id="userInfo" class="text-muted"></div>

                </div>

                <button
                    class="btn btn-danger"
                    onclick="logout()"
                >
                    ออกจากระบบ
                </button>

            </div>

        </div>

        <div class="card main-card p-4 mb-3">

            <div class="row">

                <div class="col-md-6 mb-3">

                    <label class="form-label fw-bold">
                        วันที่
                    </label>

                    <input
                        type="date"
                        id="attDate"
                        class="form-control"
                    >

                </div>

                <div class="col-md-6 mb-3">

                    <label class="form-label fw-bold">
                        ห้องเรียน
                    </label>

                    <select
                        id="classSelect"
                        class="form-select"
                        onchange="loadStudents()"
                    >
                        <option value="">
                            เลือกห้องเรียน
                        </option>
                    </select>

                </div>

            </div>

        </div>

        <div id="studentList"></div>

        <button
            id="saveBtn"
            class="btn btn-success btn-main w-100 mt-3"
            onclick="saveAttendance()"
            style="display:none;"
        >
            บันทึกการเช็คชื่อ
        </button>

    </div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyUP7ByKjRaCc5JCEdA-nsP1_-WRPjyidFxDt8LEmw0cw2xtwoHtC2q3pCI3kxSFfsC/exec";

let currentUser = null;
let students = [];

document.getElementById("attDate").valueAsDate = new Date();

async function apiGet(action, params = {}) {

    const query =
    new URLSearchParams({
        action,
        ...params
    });

    const response =
    await fetch(
        API_URL + "?" + query.toString()
    );

    return await response.json();

}

async function apiPost(data) {

    const response =
    await fetch(API_URL, {
        method:"POST",
        body:JSON.stringify(data)
    });

    return await response.json();

}

async function login(){

    const username =
    document.getElementById("username").value;

    const password =
    document.getElementById("password").value;

    if(!username || !password){

        Swal.fire(
            "แจ้งเตือน",
            "กรุณากรอกข้อมูล",
            "warning"
        );

        return;
    }

    const result =
    await apiPost({
        action:"login",
        username,
        password
    });

    if(!result.status){

        Swal.fire(
            "ผิดพลาด",
            "เข้าสู่ระบบไม่สำเร็จ",
            "error"
        );

        return;
    }

    currentUser = result.user;

    localStorage.setItem(
        "attendanceUser",
        JSON.stringify(currentUser)
    );

    document.getElementById("loginPage").style.display = "none";
    document.getElementById("appPage").style.display = "block";

    document.getElementById("userInfo").innerHTML =
    `
    ผู้ใช้งาน :
    ${currentUser.fullName}
    `;

    loadClasses();

}

function logout(){

    localStorage.removeItem("attendanceUser");
    location.reload();

}

async function loadClasses(){

    const result =
    await apiGet("getClasses");

    const select =
    document.getElementById("classSelect");

    select.innerHTML =
    `
    <option value="">
    เลือกห้องเรียน
    </option>
    `;

    result.data.forEach(item=>{

        select.innerHTML +=
        `
        <option value="${item.classId}">
            ${item.className}
        </option>
        `;

    });

}

async function loadStudents(){

    const classId =
    document.getElementById("classSelect").value;

    if(!classId){

        document.getElementById("studentList").innerHTML = "";
        return;

    }

    const result =
    await apiGet(
        "getStudents",
        {classId}
    );

    students = result.data;

    const box =
    document.getElementById("studentList");

    box.innerHTML = "";

    students.forEach(student=>{

        box.innerHTML +=
        `
        <div class="student-card">

            <div class="fw-bold mb-1">
                ${student.numberNo}.
                ${student.firstName}
                ${student.lastName}
            </div>

            <div class="text-muted small mb-3">
                รหัส ${student.studentCode}
            </div>

            <select
                class="form-select statusSelect"
                data-id="${student.studentId}"
            >

                <option value="present">
                    มาเรียน
                </option>

                <option value="late">
                    สาย
                </option>

                <option value="leave">
                    ลา
                </option>

                <option value="absent">
                    ขาด
                </option>

            </select>

        </div>
        `;

    });

    document.getElementById("saveBtn").style.display = "block";

}

async function saveAttendance(){

    const classId =
    document.getElementById("classSelect").value;

    const date =
    document.getElementById("attDate").value;

    const attendance = [];

    document.querySelectorAll(".statusSelect")
    .forEach(item=>{

        attendance.push({

            studentId:
            item.dataset.id,

            status:
            item.value,

            note:""

        });

    });

    const result =
    await apiPost({

        action:"saveAttendance",

        classId,
        date,

        teacherId:
        currentUser.teacherId,

        attendance

    });

    if(result.status){

        Swal.fire(
            "สำเร็จ",
            "บันทึกข้อมูลเรียบร้อย",
            "success"
        );

    }else{

        Swal.fire(
            "ผิดพลาด",
            "ไม่สามารถบันทึกข้อมูลได้",
            "error"
        );

    }

}

window.onload = ()=>{

    const user =
    localStorage.getItem(
        "attendanceUser"
    );

    if(user){

        currentUser =
        JSON.parse(user);

        document.getElementById("loginPage").style.display = "none";
        document.getElementById("appPage").style.display = "block";

        document.getElementById("userInfo").innerHTML =
        `
        ผู้ใช้งาน :
        ${currentUser.fullName}
        `;

        loadClasses();

    }

}

</script>

</body>
</html>
